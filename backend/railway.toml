[build]
builder = "NIXPACKS"
buildCommand = "python manage.py collectstatic --no-input"

[deploy]
startCommand = "python manage.py migrate --no-input && gunicorn backendmayasgarage.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
healthcheckPath = "/api/vehicles/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
